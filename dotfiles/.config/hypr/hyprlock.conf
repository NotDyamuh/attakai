$accent = rgba(255, 255, 255, 0.8)
$text = rgba(242, 243, 244, 0.75)
$font = JetBrains Mono Nerd Font

general {
    no_fade_in = false
    no_fade_out = false
    hide_cursor = true
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = screenshot 
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2 
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M %p")"
    color = $text
    font_size = 90
    font_family = $font ExtraBold
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = $text
    font_size = 20
    font_family = $font
    position = 0, 10
    halign = center
    valign = center
}

image {
    monitor =
    path = /path/to/your/pfp.png
    size = 100
    border_size = 2
    border_color = $accent
    position = 0, -100
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 60
    outline_thickness = 4
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(255, 255, 255, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = $text
    fade_on_empty = false
    placeholder_text = <span foreground="##ffffff99">Password...</span>
    hide_input = false
    check_color = $accent
    fail_color = rgba(204, 34, 34, 1.0) 
    rounding = -1
    position = 0, -210
    halign = center
    valign = center
}

label {
    monitor =
    text = $FAIL
    color = rgba(204, 34, 34, 1.0)
    font_size = 12
    font_family = $font
    position = 0, -280
    halign = center
    valign = center
}